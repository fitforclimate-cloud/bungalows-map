name: Update Bungalows Map


on:
  schedule:
    - cron: "15 */6000000 * * *"   # every 6000000 hours at minute 15
  workflow_dispatch:         # manual run button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync with origin
        run: |
          git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python generate_map.py
      
      - name: Write build timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_build_utc.txt

      - name: Prove map updated + git sees changes
        run: |
          set -e
          echo "== files =="
          ls -la bungalows_map.html bungalows_snapshot.csv bungalows_new.csv last_build_utc.txt

          echo "== updated marker present? =="
          grep -n "updated:" bungalows_map.html

          echo "== sha256 (working tree) =="
          sha256sum bungalows_map.html

          echo "== sha256 (HEAD) =="
          git show HEAD:bungalows_map.html | sha256sum || echo "No bungalows_map.html in HEAD yet"

          echo "== git status =="
          git status --porcelain

          echo "== staged diff (after add, in next step) will show files =="
          
      - name: Commit outputs
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Add outputs
          git add bungalows_map.html bungalows_snapshot.csv bungalows_new.csv last_build_utc.txt

          # Add cache files only if present
          test -f geo_cache.json && git add geo_cache.json || true
          test -f reverse_cache.json && git add reverse_cache.json || true

          echo "== staged files =="
          git diff --cached --name-only

          git commit -m "Auto update map" || echo "No changes"
          git push
      

