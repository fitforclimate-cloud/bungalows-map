name: Update Bungalows Map

on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 hours at minute 15
  workflow_dispatch:         # manual run button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python generate_map.py

      - name: Debug outputs existence + changes
        run: |
          echo "== files =="
          ls -la bungalows_map.html bungalows_snapshot.csv bungalows_new.csv || true

          echo "== first line of html (quick sanity) =="
          head -n 2 bungalows_map.html || true

          echo "== git status (incl ignored) =="
          git status --porcelain
          git status --ignored --porcelain

          echo "== is html tracked? =="
          git ls-files -- bungalows_map.html || true

          echo "== is html ignored? =="
          git check-ignore -v bungalows_map.html || echo "NOT ignored"
      
      - name: List files after run
        run: ls -la

      - name: Commit outputs
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Zorg dat je up-to-date bent vóór je commit
          git pull --rebase

          # Add de files die zeker bestaan
          git add bungalows_map.html bungalows_snapshot.csv bungalows_new.csv

          # Add cache files alleen als ze bestaan
          test -f geo_cache.json && git add geo_cache.json || true
          test -f reverse_cache.json && git add reverse_cache.json || true

          # Commit/push indien er changes zijn
          git commit -m "Auto update map" || echo "No changes"
          git push
      
      - name: Debug funda HTML snippet
        run: |
          python - <<'PY'
          import requests
          url="https://www.funda.nl/zoeken/koop?selected_area=[%22regio-zuid-limburg,50km%22]&object_type=[%22house%22]&object_type_house=[%22bungalow%22]&publication_date=%2210%22&bedrooms=%222-%22"
          r=requests.get(url, headers={"User-Agent":"Mozilla/5.0"}, timeout=30)
          print("status:", r.status_code)
          print("len:", len(r.text))
          print("first500:", r.text[:500].replace("\\n"," "))
          print("has_detail:", "/detail/koop/" in r.text)
          PY
