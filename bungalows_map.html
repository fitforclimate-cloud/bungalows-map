      window._openRouteSmart = function(lat, lon){
        try{
          var ua = navigator.userAgent || "";
          var isApple = /iPad|iPhone|iPod/.test(ua) || (ua.includes("Macintosh") && "ontouchend" in document);
          var url = isApple
            ? ("https://maps.apple.com/?daddr=" + lat + "," + lon + "&dirflg=d")
            : ("https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon);
          window.open(url, "_blank");
        } catch(e){
          window.open("https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon, "_blank");
        }
      };

      window._copyText = function(txt){
        try{
          if(navigator.clipboard && navigator.clipboard.writeText){
            navigator.clipboard.writeText(txt);
            alert("Link gekopieerd");
            return;
          }
        } catch(e){}
        try{
          var ta = document.createElement("textarea");
          ta.value = txt;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          alert("Link gekopieerd");
        } catch(e){
          alert("Kopiëren lukt niet automatisch. Hou de link ingedrukt en kies Kopieer.");
        }
      };
    </script>

        (function(){
          var map = map_f0c81a53f21e8ecf2d733cafa534620a;
          if(!map || !L) return;

          var pos = "topleft";

          var MyLoc = L.Control.extend({
            options: { position: pos },
            onAdd: function () {
              var container = L.DomUtil.create('div', 'leaflet-bar');
              container.style.background = "rgba(255,255,255,0.95)";
              container.style.border = "1px solid #bbb";
              container.style.borderRadius = "12px";
              container.style.boxShadow = "0 2px 10px rgba(0,0,0,0.12)";
              container.style.overflow = "hidden";

              var btn = L.DomUtil.create('a', '', container);
              btn.href = "#";
              btn.title = "Mijn locatie";
              btn.innerHTML = "📍 Mijn locatie";
              btn.style.display = "block";
              btn.style.padding = "10px 12px";
              btn.style.fontSize = "14px";
              btn.style.fontWeight = "800";
              btn.style.textDecoration = "none";
              btn.style.color = "#111";
              btn.style.userSelect = "none";
              btn.style.touchAction = "manipulation";
              btn.style.webkitTapHighlightColor = "transparent";

              L.DomEvent.disableClickPropagation(container);
              L.DomEvent.disableScrollPropagation(container);

              L.DomEvent.on(btn, 'click', function(e){
                L.DomEvent.preventDefault(e);
                map.locate({
                  setView: true,
                  maxZoom: 15,
                  enableHighAccuracy: true,
                  timeout: 12000
                });
              });

              return container;
            }
          });

          map.addControl(new MyLoc());

          var myMarker = null;
          var myCircle = null;

          function onLocationFound(e){
            var latlng = e.latlng;
            var acc = e.accuracy || 0;

            if(myMarker) map.removeLayer(myMarker);
            if(myCircle) map.removeLayer(myCircle);

            myMarker = L.circleMarker(latlng, {
              radius: 8,
              weight: 2,
              color: "#1a73e8",
              fillColor: "#1a73e8",
              fillOpacity: 0.9
            }).addTo(map);

            if(acc > 0){
              myCircle = L.circle(latlng, {
                radius: acc,
                weight: 1,
                color: "#1a73e8",
                fillColor: "#1a73e8",
                fillOpacity: 0.12
              }).addTo(map);
            }

            myMarker.bindPopup("Jij bent hier (± " + Math.round(acc) + " m)").openPopup();
          }

          map.on("locationfound", onLocationFound);

        })();
