              var btn = L.DomUtil.create('a', '', container);
              btn.href = "#";
              btn.title = "Mijn locatie";
              btn.innerHTML = "📍 Mijn locatie";
              btn.style.display = "block";
              btn.style.padding = "10px 12px";
              btn.style.fontSize = "14px";
              btn.style.fontWeight = "800";
              btn.style.textDecoration = "none";
              btn.style.color = "#111";
              btn.style.userSelect = "none";
              btn.style.touchAction = "manipulation";

              L.DomEvent.disableClickPropagation(container);
              L.DomEvent.disableScrollPropagation(container);

              L.DomEvent.on(btn, 'click', function(e){
                L.DomEvent.preventDefault(e);
                map.locate({
                  setView: true,
                  maxZoom: 15,
                  enableHighAccuracy: true,
                  timeout: 12000
                });
              });

              return container;
            }
          });

          map.addControl(new MyLoc());

          var myMarker = null;
          var myCircle = null;

          function onLocationFound(e){
            var latlng = e.latlng;
            var acc = e.accuracy || 0;

            if(myMarker) map.removeLayer(myMarker);
            if(myCircle) map.removeLayer(myCircle);

            myMarker = L.circleMarker(latlng, {
              radius: 8,
              weight: 2,
              color: "#1a73e8",
              fillColor: "#1a73e8",
              fillOpacity: 0.9
            }).addTo(map);

            if(acc > 0){
              myCircle = L.circle(latlng, {
                radius: acc,
                weight: 1,
                color: "#1a73e8",
                fillColor: "#1a73e8",
                fillOpacity: 0.12
              }).addTo(map);
            }

            myMarker.bindPopup("Jij bent hier (± " + Math.round(acc) + " m)");
          }

          map.on("locationfound", onLocationFound);
