              btn.style.display = "block";

              L.DomEvent.disableScrollPropagation(container);

              L.DomEvent.on(btn, 'click', function(e){
                L.DomEvent.preventDefault(e);
                map.locate({
                  setView: true,
                  maxZoom: 15,
                  enableHighAccuracy: true,
                  timeout: 12000
                });
              });

              return container;
            }
          });

          map.addControl(new MyLoc());

          var myMarker = null;
          var myCircle = null;

          function onLocationFound(e){
            var latlng = e.latlng;
            var acc = e.accuracy || 0;

            if(myMarker) map.removeLayer(myMarker);
            if(myCircle) map.removeLayer(myCircle);

            myMarker = L.circleMarker(latlng, {
              radius: 8,
              weight: 2,
              color: "#1a73e8",
              fillColor: "#1a73e8",
              fillOpacity: 0.9
            }).addTo(map);

            if(acc > 0){
              myCircle = L.circle(latlng, {
                radius: acc,
                weight: 1,
                color: "#1a73e8",
                fillColor: "#1a73e8",
                fillOpacity: 0.12
              }).addTo(map);
            }

          }
