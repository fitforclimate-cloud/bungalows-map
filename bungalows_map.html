          if(!map || !L) return;

          var pos = "topleft";

          var MyLoc = L.Control.extend({
            options: { position: pos },
            onAdd: function () {
              var container = L.DomUtil.create('div', 'leaflet-bar');
              container.style.background = "rgba(255,255,255,0.95)";
              container.style.border = "1px solid #bbb";
              container.style.borderRadius = "12px";
              container.style.boxShadow = "0 2px 10px rgba(0,0,0,0.12)";
              container.style.overflow = "hidden";

              var btn = L.DomUtil.create('a', '', container);
              btn.href = "#";
              btn.title = "Mijn locatie";
              btn.innerHTML = "📍 Mijn locatie";
              btn.style.display = "block";
              btn.style.padding = "10px 12px";
              btn.style.fontSize = "14px";
              btn.style.fontWeight = "800";
              btn.style.textDecoration = "none";
              btn.style.color = "#111";
              btn.style.userSelect = "none";
              btn.style.touchAction = "manipulation";

              L.DomEvent.disableClickPropagation(container);
              L.DomEvent.disableScrollPropagation(container);

              L.DomEvent.on(btn, 'click', function(e){
                L.DomEvent.preventDefault(e);
                map.locate({
                  setView: true,
                  maxZoom: 15,
                  enableHighAccuracy: true,
                  timeout: 12000
                });
              });

              return container;
            }
          });

          map.addControl(new MyLoc());

          var myMarker = null;
          var myCircle = null;

          function onLocationFound(e){
            var latlng = e.latlng;
            var acc = e.accuracy || 0;

            if(myMarker) map.removeLayer(myMarker);
            if(myCircle) map.removeLayer(myCircle);

            myMarker = L.circleMarker(latlng, {
              radius: 8,
              weight: 2,
              color: "#1a73e8",
              fillColor: "#1a73e8",
              fillOpacity: 0.9
            }).addTo(map);

            if(acc > 0){
              myCircle = L.circle(latlng, {
                radius: acc,
                weight: 1,
                color: "#1a73e8",
                fillColor: "#1a73e8",
                fillOpacity: 0.12
              }).addTo(map);
            }

            myMarker.bindPopup("Jij bent hier (± " + Math.round(acc) + " m)");
          }

          map.on("locationfound", onLocationFound);

        })();
        
    
        (function(){

          function showGeoHelp(e){
            var code = (e && typeof e.code !== "undefined") ? e.code : null;
            var msg = "Locatie kon niet worden bepaald.\n\n";

            if(code === 1){
              msg += "Toegang tot locatie is geweigerd (browser-permissie).\n\n";
            } else if(code === 2){
              msg += "Locatie is niet beschikbaar (GPS staat vaak uit, of geen signaal).\n\n";
            } else if(code === 3){
              msg += "Timeout: het bepalen van je locatie duurde te lang.\n\n";
            } else {
              msg += "Onbekende fout bij geolocatie.\n\n";
            }

            msg += "Controleer:\n";
            msg += "• GPS/Locatie staat AAN op je telefoon\n";
            msg += "• De browser mag je locatie gebruiken (Site-instellingen)\n\n";
            msg += "Tip iPhone: Instellingen → Privacy & beveiliging → Locatievoorzieningen → Safari websites\n";
            msg += "Tip Android: Chrome → Instellingen → Site-instellingen → Locatie";

            alert(msg);
          }

          map.on("locationerror", showGeoHelp);
        })();
